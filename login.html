<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Inventory Comparison Tool</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  /* TODO: paste your NEW Firebase project's config here — same object as in the main tool file */
  const firebaseConfig = {
    apiKey: "AIzaSyDiH6qJuT8GiZv0nhd-LNiLfvv0o73py7w",
    authDomain: "inventory-tool-292be.firebaseapp.com",
    projectId: "inventory-tool-292be",
    storageBucket: "inventory-tool-292be.firebasestorage.app",
    messagingSenderId: "1093604119984",
    appId: "1:1093604119984:web:2570c06a89d212fceef275"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Where to send the user after a successful login.
  // Change this if you rename the main tool file.
  const REDIRECT_TO = "Inventory_Comparison_EN.html";

  // If already signed in, skip the login form entirely.
  onAuthStateChanged(auth, (user) => { if (user) window.location.href = REDIRECT_TO; });

  window.doLogin = async function () {
    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("pass").value;
    const errEl = document.getElementById("err");
    const btn = document.getElementById("btn");
    errEl.textContent = "";
    if (!email || !pass) { errEl.textContent = "Please enter your email and password"; return; }
    btn.disabled = true; btn.textContent = "Signing in...";
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      window.location.href = REDIRECT_TO;
    } catch (e) {
      errEl.textContent = (e.code === "auth/invalid-credential" || e.code === "auth/wrong-password" || e.code === "auth/user-not-found")
        ? "Incorrect email or password"
        : "Sign-in error: " + e.message;
      btn.disabled = false; btn.textContent = "Sign In";
    }
  };

  window.addEventListener("DOMContentLoaded", () => {
    document.getElementById("pass").addEventListener("keydown", (e) => { if (e.key === "Enter") window.doLogin(); });
    document.getElementById("email").addEventListener("keydown", (e) => { if (e.key === "Enter") document.getElementById("pass").focus(); });
  });
</script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,Tahoma,sans-serif;background:linear-gradient(135deg,#1F4E79,#2E75B6);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .login-box{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:360px;box-shadow:0 10px 40px rgba(0,0,0,.25);text-align:center}
  .login-box .ico{font-size:36px;margin-bottom:6px}
  .login-box h1{font-size:18px;color:#1F4E79;margin-bottom:4px}
  .login-box p{font-size:12px;color:#888;margin-bottom:20px}
  .login-box input{width:100%;padding:11px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:12px;font-family:inherit}
  .login-box input:focus{border-color:#2E75B6;outline:none}
  .login-box button{width:100%;background:#1F4E79;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .login-box button:hover{background:#2E75B6}
  .login-box button:disabled{opacity:.5;cursor:not-allowed}
  .login-err{color:#e74c3c;font-size:12px;margin-top:10px;min-height:14px}
</style>
</head>
<body>
  <div class="login-box">
    <div class="ico">📦</div>
    <h1>Inventory Comparison Tool</h1>
    <p>Sign in to continue — authorized users only</p>
    <input type="email" id="email" placeholder="Email" autocomplete="username">
    <input type="password" id="pass" placeholder="Password" autocomplete="current-password">
    <button id="btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="err"></div>
  </div>
</body>
</html>
